apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: microservices
  labels:
    app.kubernetes.io/name: api-service
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP          # Internal only — traffic enters via Ingress
  selector:
    app: api-service
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
