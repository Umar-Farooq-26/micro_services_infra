apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: microservices-ingress
  namespace: microservices
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/rate-limit: "100"           # Requests/second per IP
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - dev.microservices.example.com
      secretName: microservices-tls                          # Created via cert-manager or manually
  rules:
    - host: dev.microservices.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  name: http
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  name: http
