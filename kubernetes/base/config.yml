apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: microservices
  labels:
    app.kubernetes.io/name: app-config
    app.kubernetes.io/managed-by: kubectl
data:
  # Non-sensitive application configuration
  APP_ENV: "dev"
  LOG_LEVEL: "info"
  PORT: "8080"
  METRICS_PORT: "9090"
  # Service discovery — use Kubernetes DNS (service.namespace.svc.cluster.local)
  AUTH_SERVICE_URL: "http://auth-service.microservices.svc.cluster.local:8080"
  ORDER_SERVICE_URL: "http://order-service.microservices.svc.cluster.local:8080"
  PRODUCT_SERVICE_URL: "http://product-service.microservices.svc.cluster.local:8080"
